version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: pinkbasket-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pinkbasket-backend
    ports:
      - "8001:8001"
    environment:
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
    depends_on:
      - rabbitmq
    restart: unless-stopped

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pinkbasket-celery
    command: celery -A core worker -l info
    environment:
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
    depends_on:
      - backend
      - rabbitmq
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pinkbasket-frontend
    ports:
      - "5173:80" # Map host 5173 to container 80 so it matches the current dev URL
    depends_on:
      - backend
    restart: unless-stopped
