version: '3.8'

services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: pinkbasket-backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pinkbasket-frontend
    ports:
      - "5173:80" # Map host 5173 to container 80 so it matches the current dev URL
    depends_on:
      - backend
    restart: unless-stopped
